<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birleşik Eşleştirme ve Harita Yönetimi (GitHub Edition)</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
  
  <style>
    :root {
        --bg-primary: #0f172a; --bg-secondary: #1e293b; --bg-card: #0f172a; --bg-card-hover: #334155;
        --accent: #3b82f6; --accent-hover: #2563eb; --text-primary: #f8fafc; --text-secondary: #94a3b8;
        --text-muted: #64748b; --border: rgba(51, 65, 85, 0.5); --border-light: rgba(148, 163, 184, 0.2);
        --success: #22c55e; --success-bg: rgba(34, 197, 94, 0.1); --warning: #eab308;
        --warning-bg: rgba(234, 179, 8, 0.1); --danger: #ef4444; --danger-bg: rgba(239, 68, 68, 0.1);
        --active-row-bg: rgba(59, 130, 246, 0.15); --active-row-border: #3b82f6;
        --radius: 12px; --radius-sm: 8px; --transition: all 0.2s ease;
    }

    body { margin: 0; padding: 0; display: flex; height: 100vh; font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); overflow: hidden; }
    
    #left-panel { width: 45%; min-width: 450px; max-width: 600px; display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--bg-secondary); z-index: 10; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
    #right-panel { flex: 1; position: relative; display: flex; flex-direction: column; background: var(--bg-primary); }
    #map { flex: 1; background: #0f172a; width: 100%; }
    
    .panel-header { padding: 16px 20px; background: rgba(15, 23, 42, 0.95); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .panel-header h1 { font-size: 16px; font-weight: 600; margin: 0; }
    
    .scrollable { overflow-y: auto; padding: 16px 20px; flex: 1; }
    .scrollable::-webkit-scrollbar { width: 6px; }
    .scrollable::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    
    .stat-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px; flex: 1; min-width: 70px; text-align: center; }
    .stat-card .val { font-size: 18px; font-weight: 700; }
    .stat-card .lbl { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    .stat-card.ok .val { color: var(--success); } .stat-card.warn .val { color: var(--warning); } .stat-card.err .val { color: var(--danger); }
    
    select, input[type="text"] { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); border-radius: var(--radius-sm); padding: 8px 12px; font-size: 13px; font-family: inherit; }
    
    .btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); border-radius: var(--radius-sm); padding: 8px 14px; font-size: 13px; cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; gap: 6px; }
    .btn:hover { background: var(--bg-card-hover); border-color: var(--text-muted); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
    
    .match-list { display: flex; flex-direction: column; gap: 8px; }
    .match-row { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; display: flex; flex-direction: column; gap: 10px; cursor: pointer; transition: var(--transition); position: relative; }
    .match-row.active { background: var(--active-row-bg); border-color: var(--active-row-border); border-left: 4px solid var(--accent); }
    .match-row.onaylandi { border-left: 3px solid var(--success); }
    .match-row.bekliyor { border-left: 3px solid var(--warning); }
    .match-row.eslesmedi { border-left: 3px solid var(--danger); }
    
    .kno-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .kno-tag { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 99px; padding: 4px 10px; font-size: 11px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
    .kno-tag .remove { color: var(--danger); cursor: pointer; font-weight: bold; }
    
    .map-overlay-top { position: absolute; top: 15px; left: 60px; z-index: 1000; background: rgba(15, 23, 42, 0.9); padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); backdrop-filter: blur(5px); display: flex; gap: 10px; align-items: center; }
    
    .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .filter-btn { background: var(--bg-card); border: 1px solid var(--border); border-radius: 99px; color: var(--text-secondary); padding: 5px 12px; font-size: 12px; cursor: pointer; }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

    .srow-header { display: flex; justify-content: space-between; align-items: center; }
    .srow-header .sistem-adi { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .srow-header .sistem-ilce { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; }
    .row-actions { display: flex; gap: 6px; margin-top: 4px; }
    .row-actions button { flex: 1; padding: 5px; font-size: 11px; }

    /* Mobil Uyumlu Akordiyon Menü İçin */
    .mobile-toggle-btn {
        display: none; background: rgba(59,130,246,0.2); border: 1px solid var(--accent); color: white;
        padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 700;
    }
    @media (max-width: 768px) {
        body { flex-direction: column; }
        #left-panel { border-right: none; border-bottom: 2px solid var(--accent); z-index: 2002; display: flex; flex-direction: column; flex: none; width: 100% !important; min-width: auto; max-width: none; max-height: 60vh;}
        .scrollable { display: none; }
        .scrollable.active { display: block; }
        .mobile-toggle-btn { display: block; }
        #right-panel { flex: 1; min-height: 40vh; }
        .map-overlay-top { left: 10px; top: 10px; }
    }

    .loader { border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid var(--accent); border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="left-panel">
    <div class="panel-header">
      <div style="display:flex; justify-content:space-between; align-items:center; width:100%; margin-bottom: 10px;">
        <h1 style="display:flex; align-items:center; gap:8px;">🗂️ Eşleştirme <span style="font-size:0.6rem; background:rgba(59,130,246,0.2); color:var(--accent); padding:2px 6px; border-radius:4px;">STATIC</span></h1>
        <button class="mobile-toggle-btn" id="mobile-toggle-menu">▼ Menü</button>
      </div>
      <div style="display: flex; gap: 6px; flex-wrap: wrap;">
        <button class="btn" onclick="document.getElementById('file-upload-input').click()">📥 Excel</button>
        <button class="btn" onclick="loadServerJSON()">📂 Liste</button>
        <button class="btn" onclick="document.getElementById('local-json-input').click()">📁 Yerel JSON</button>
        <input type="file" id="file-upload-input" accept=".xlsx,.xls" onchange="handleExcelUpload(event)" style="display:none;">
        <input type="file" id="local-json-input" accept=".json" onchange="handleLocalJSON(event)" style="display:none;">
      </div>
      <div style="width: 100%; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);">
        <a href="index.html" class="btn btn-primary" style="text-decoration:none; width:100%; justify-content:center; box-sizing: border-box;">🗺️ Harita Analizine Geri Dön</a>
      </div>
    </div>
    
    <div class="scrollable">
      <div style="display: flex; gap: 8px; margin-bottom: 12px;">
        <input type="text" id="search-input" placeholder="Mahalle veya İlçe ara..." style="flex:1" oninput="renderList()">
        <select id="ilce-filter" onchange="renderList()">
          <option value="">Tüm İlçeler</option>
        </select>
      </div>
      
      <div class="filter-bar">
        <button class="filter-btn active" data-f="all" onclick="setFilter('all', this)">Tümü</button>
        <button class="filter-btn" data-f="onayli" onclick="setFilter('onayli', this)">✅ Onaylı</button>
        <button class="filter-btn" data-f="bekleyen" onclick="setFilter('bekleyen', this)">⚠️ Bekleyen</button>
        <button class="filter-btn" data-f="eslesmeyen" onclick="setFilter('eslesmeyen', this)">❌ Eşleşmedi</button>
      </div>

      <div class="stat-row" id="stats"></div>
      <div class="match-list" id="match-list">
        <div style="text-align:center; padding:30px; color:var(--text-muted); font-size:13px;">Lütfen veri yükleyin.</div>
      </div>
    </div>
    
    <div class="panel-header" style="background:#0f172a; border-top:1px solid var(--border);">
      <input type="text" id="dl-filename" placeholder="eslesme" style="width:150px;">
      <button class="btn btn-primary" onclick="downloadJSON()">💾 JSON İndir</button>
    </div>
  </div>

  <div id="right-panel">
    <div class="map-overlay-top">
      <div style="display:flex; flex-direction:column; gap:4px;">
        <label style="font-size:10px; color:var(--text-muted); font-weight:600; text-transform:uppercase;">Harita Verisi (GeoJSON)</label>
        <select id="map-source-select" style="min-width: 250px;" onchange="loadSelectedMap()">
          <option value="">Yükleniyor...</option>
        </select>
      </div>
      <div id="map-loader" class="loader" style="display:none; margin-left:10px;"></div>
    </div>
    <div id="map"></div>
  </div>

<script>
let map, geoJsonLayer, geoData = null, geoIndex = {}, eslesmeData = { eslesmeler: {}, geoEslesmeyenler: [], metaveriler: {} }, activeRowKey = null, currentFilter = 'all';

const COLORS = { matched: '#22c55e', unmatched: '#ef4444' };

document.addEventListener("DOMContentLoaded", () => {
    initMap();
    fetchMapSources();
    
    document.getElementById('mobile-toggle-menu')?.addEventListener('click', function () {
        const content = document.querySelector('.scrollable');
        content.classList.toggle('active');
        this.textContent = content.classList.contains('active') ? '▲ Kapat' : '▼ Menü';
        
        // Mobilde menü kapandığında haritayı yenile (boyut değişikliği için)
        if (map) setTimeout(() => map.invalidateSize(), 300);
    });
});

function initMap() {
    map = L.map('map', { zoomControl: false }).setView([37.215, 28.363], 9);
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);
}

async function fetchMapSources() {
    try {
        const res = await fetch('maps.json?t=' + new Date().getTime());
        const data = await res.json();
        const sel = document.getElementById('map-source-select');
        sel.innerHTML = '';
        data.maps.forEach(m => {
            const opt = new Option(m.name, m.path);
            sel.add(opt);
        });
        loadSelectedMap();
    } catch(err) { console.error(err); }
}

async function loadSelectedMap() {
    const path = document.getElementById('map-source-select').value;
    if (!path) return;
    document.getElementById('map-loader').style.display = 'inline-block';
    try {
        const res = await fetch(path);
        geoData = await res.json();
        geoIndex = {};
        geoData.features.forEach(f => {
            const p = f.properties;
            const ad = p.AD || p.name || p.MAHALLE || "Bilinmiyor";
            const ilce = p.ILCEAD || p.ilce || p.DISTRICT || "Bilinmiyor";
            const kno = p.KIMLIKNO || p.id || p.ID || Math.floor(Math.random()*100000);
            f.properties.STD_AD = ad; f.properties.STD_ILCE = ilce; f.properties.STD_KNO = kno;
            geoIndex[kno] = { ad, ilce, kno };
        });
        renderMap();
        renderList();
    } catch(err) { console.error(err); }
    finally { document.getElementById('map-loader').style.display = 'none'; }
}

function renderMap() {
    if (geoJsonLayer) map.removeLayer(geoJsonLayer);
    const assignedIds = new Set();
    Object.values(eslesmeData.eslesmeler).forEach(e => (e.eslesmeler || []).forEach(id => assignedIds.add(String(id))));
    geoJsonLayer = L.geoJSON(geoData, {
        style: (f) => ({ fillColor: assignedIds.has(String(f.properties.STD_KNO)) ? COLORS.matched : COLORS.unmatched, weight: 1, fillOpacity: 0.5, color: '#444' }),
        onEachFeature: (f, l) => { l.on('click', (e) => handleMapClick(f, e)); }
    }).addTo(map);
    if (geoData.features.length) map.fitBounds(geoJsonLayer.getBounds());
}

function handleMapClick(f, e) {
    const kno = String(f.properties.STD_KNO);
    const matchEntry = Object.entries(eslesmeData.eslesmeler).find(([k, v]) => v.eslesmeler?.includes(kno));
    
    let html = `<div style="padding:5px; min-width:180px;">`;
    html += `<b>${f.properties.STD_AD}</b><br><span style="font-size:11px">${f.properties.STD_ILCE}</span><br>`;
    
    if (matchEntry) {
        html += `<div style="margin-top:5px; color:#16a34a; font-size:11px;">Eşli: <b>${matchEntry[1].sistemMahalle} (${matchEntry[1].sistemIlce})</b></div>`;
    } else {
        html += `<div style="margin-top:5px; color:#dc2626; font-size:11px;">⚠️ ATANMAMIŞ</div>`;
    }

    if (activeRowKey) {
        const eData = eslesmeData.eslesmeler[activeRowKey];
        if (!eData.eslesmeler.some(id => String(id) === kno)) {
            html += `<hr style="border:0; border-top:1px solid #ccc;"><button onclick="commitAdd('${activeRowKey.replace(/'/g, "\\'")}', '${kno}')" style="background:#3b82f6; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; width:100%; font-size:12px;">Aktif Satıra Ekle</button>`;
        }
    }
    html += `</div>`;
    L.popup({ autoPan:false }).setLatLng(e.latlng).setContent(html).openOn(map);
}

window.commitAdd = (key, kno) => {
    const eData = eslesmeData.eslesmeler[key];
    if (eData && !eData.eslesmeler.some(id => String(id) === kno)) {
        eData.eslesmeler.push(kno);
        eData.eslesmeTuru = 'manuel';
        updateStats(); renderList(); renderMap(); map.closePopup();
    }
};

async function loadServerJSON() {
    const res = await fetch('mappings.json');
    const data = await res.json();
    const list = data.files.map((f, i) => `${i+1}. ${f.name}`).join('\n');
    const idx = prompt("Dosya seçin:\n" + list, "1");
    if (idx && data.files[idx-1]) {
        const fres = await fetch(data.files[idx-1].path);
        eslesmeData = await fres.json();
        postDataLoad();
    }
}

function handleExcelUpload(e) {
    const file = e.target.files[0];
    if(!file) return;
    document.getElementById('dl-filename').value = file.name.split('.')[0] + "_eslesme";
    const reader = new FileReader();
    reader.onload = (ev) => {
        const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
        const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
        processExcel(json);
    };
    reader.readAsArrayBuffer(file);
}

function processExcel(json) {
    const cols = Object.keys(json[0]);
    const mCol = cols.find(c => { const k = c.toString().toLocaleUpperCase('tr-TR'); return k.includes('MAHALLE') || k === 'AD' || k.includes('KÖY'); });
    const iCol = cols.find(c => { const k = c.toString().toLocaleUpperCase('tr-TR'); return k.includes('İLÇE') || k.includes('ILCE'); });

    if (!mCol) { alert("Excelde Mahalle sütunu bulunamadı!"); return; }

    const newMappings = {};
    const haritaMahalleleri = Object.values(geoIndex);

    json.forEach(row => {
        const mNameRaw = row[mCol]?.toString() || "";
        const iNameRaw = iCol ? (row[iCol]?.toString() || "") : "";
        let mName = mNameRaw.toLocaleUpperCase('tr-TR');
        let iName = iNameRaw.toLocaleUpperCase('tr-TR').trim();
        
        mName = mName.replace(/\s+(MAHALLESİ|MAHALLE|KÖYÜ|KÖY)\b/g, '').replace(/\s+MAH\./g, '').trim();
        if (mName.endsWith(" MAHALLESİ")) mName = mName.replace(" MAHALLESİ", "");

        if (!mName) return;
        const key = `${iName}|${mName}`;
        if (eslesmeData.eslesmeler[key]) { newMappings[key] = eslesmeData.eslesmeler[key]; return; }

        let matchedIds = []; let eslesmeTuru = 'eslesmedi';
        const exact = haritaMahalleleri.filter(g => g.ad.toLocaleUpperCase('tr-TR') === mName && (iName === "" || g.ilce.toLocaleUpperCase('tr-TR') === iName));
        if (exact.length > 0) { matchedIds = exact.map(x => x.kno); eslesmeTuru = 'birebir'; }
        else {
            const fuzzy = haritaMahalleleri.filter(g => (iName === "" || g.ilce.toLocaleUpperCase('tr-TR') === iName) && (g.ad.toLocaleUpperCase('tr-TR').includes(mName) || mName.includes(g.ad.toLocaleUpperCase('tr-TR'))));
            if (fuzzy.length > 0) { matchedIds = fuzzy.map(x => x.kno); eslesmeTuru = 'otomatik'; }
        }
        newMappings[key] = { sistemIlce: iName || "BİLİNMİYOR", sistemMahalle: mName, eslesmeler: matchedIds, eslesmeTuru: eslesmeTuru, manuelOnaylandi: eslesmeTuru === 'birebir' };
    });
    eslesmeData.eslesmeler = newMappings;
    activeRowKey = null; postDataLoad();
}

function handleLocalJSON(e) {
    const file = e.target.files[0];
    if(!file) return;
    document.getElementById('dl-filename').value = file.name.replace('.json', '');
    const reader = new FileReader();
    reader.onload = (ev) => { eslesmeData = JSON.parse(ev.target.result); postDataLoad(); };
    reader.readAsText(file);
}

function postDataLoad() {
    buildIlceFilter(); updateStats(); renderList(); renderMap();
}

function buildIlceFilter() {
    const ilceler = new Set();
    Object.values(eslesmeData.eslesmeler).forEach(e => { if(e.sistemIlce) ilceler.add(e.sistemIlce); });
    const sel = document.getElementById('ilce-filter');
    sel.innerHTML = '<option value="">Tüm İlçeler</option>';
    [...ilceler].sort((a,b) => a.localeCompare(b, 'tr')).forEach(il => { sel.add(new Option(il, il)); });
}

function getRowClass(e) {
    if (!e.eslesmeler || e.eslesmeler.length === 0) return 'eslesmedi';
    if (!e.manuelOnaylandi) return 'bekliyor';
    return 'onaylandi';
}

function renderList() {
    const cont = document.getElementById('match-list');
    const q = document.getElementById('search-input').value.toLocaleUpperCase('tr-TR');
    const ilceSel = document.getElementById('ilce-filter').value;
    
    if (Object.keys(eslesmeData.eslesmeler).length === 0) {
        cont.innerHTML = '<div style="text-align:center; padding:30px; color:var(--text-muted); font-size:13px;">Kayıt bulunamadı.</div>';
        return;
    }
    
    const filtered = Object.entries(eslesmeData.eslesmeler).filter(([key, e]) => {
        if (ilceSel && e.sistemIlce !== ilceSel) return false;
        if (q && !e.sistemMahalle.toLocaleUpperCase('tr-TR').includes(q) && !(e.sistemIlce || '').toLocaleUpperCase('tr-TR').includes(q)) return false;
        const cls = getRowClass(e);
        if (currentFilter === 'onayli' && cls !== 'onaylandi') return false;
        if (currentFilter === 'bekleyen' && cls !== 'bekliyor') return false;
        if (currentFilter === 'eslesmeyen' && cls !== 'eslesmedi') return false;
        return true;
    });

    let html = '';
    filtered.forEach(([key, e]) => {
        const cls = getRowClass(e);
        const isActive = activeRowKey === key ? 'active' : '';
        const tags = (e.eslesmeler || []).map(id => {
            const g = geoIndex[id]; const name = g ? g.ad : (`ID:`+id);
            return `<div class="kno-tag">${name} <span class="remove" onclick="event.stopPropagation(); removeGeo('${key}','${id}')">×</span></div>`;
        }).join('');
        
        html += `<div class="match-row ${cls} ${isActive}" onclick="setActiveRow('${key.replace(/'/g, "\\'")}')">
            <div class="srow-header">
                <span class="sistem-adi">${e.sistemMahalle}</span>
                <span class="sistem-ilce" style="background:rgba(255,255,255,0.05); padding:2px 6px; border-radius:4px; font-weight:700; color:var(--accent); font-size:10px;">${e.sistemIlce || 'BİLİNMİYOR'}</span>
            </div>
            <div class="kno-tags">${tags.length > 0 ? tags : '<span style="font-size:11px; color:#ef4444; font-style:italic;">Haritadan mahalle seçin...</span>'}</div>
            <div class="row-actions">
                ${!e.manuelOnaylandi && (e.eslesmeler && e.eslesmeler.length > 0) ? `<button class="btn btn-primary" onclick="event.stopPropagation(); setOnay('${key}', true)">✓ Onayla</button>` : ``}
                ${e.manuelOnaylandi ? `<button class="btn" style="color:var(--text-secondary)" onclick="event.stopPropagation(); setOnay('${key}', false)">↩ Geri Al</button>` : ``}
                <button class="btn" style="color:var(--danger); border-color:rgba(239, 68, 68, 0.3)" onclick="event.stopPropagation(); clearRow('${key}')">✕ Sıfırla</button>
            </div>
        </div>`;
    });
    cont.innerHTML = html;
}

window.setActiveRow = function(key) { activeRowKey = activeRowKey === key ? null : key; renderList(); };
window.setOnay = function(key, val) { eslesmeData.eslesmeler[key].manuelOnaylandi = val; updateStats(); renderList(); };
window.removeGeo = function(key, id) {
    const e = eslesmeData.eslesmeler[key];
    e.eslesmeler = e.eslesmeler.filter(x => String(x) !== String(id));
    if(e.eslesmeler.length === 0) e.manuelOnaylandi = false;
    updateStats(); renderList(); renderMap();
};
window.clearRow = function(key) { 
    if(!confirm('Bu satırdaki tüm eşleşmeleri silmek istediğinize emin misiniz?')) return;
    eslesmeData.eslesmeler[key].eslesmeler = []; 
    eslesmeData.eslesmeler[key].eslesmeTuru = 'eslesmedi'; 
    eslesmeData.eslesmeler[key].manuelOnaylandi = false; 
    updateStats(); renderList(); renderMap(); 
};

function updateStats() {
    const vals = Object.values(eslesmeData.eslesmeler);
    const total = vals.length;
    if(total===0) return;
    let onay = 0, bekle = 0, esle = 0;
    vals.forEach(e => { const c = getRowClass(e); if (c==='onaylandi') onay++; else if(c==='bekliyor') bekle++; else esle++; });
    
    document.getElementById('stats').innerHTML = `
      <div class="stat-card ok"><div class="val">${onay}</div><div class="lbl">ONAYLI</div></div>
      <div class="stat-card warn"><div class="val">${bekle}</div><div class="lbl">BEKLEYÊN</div></div>
      <div class="stat-card err"><div class="val">${esle}</div><div class="lbl">EŞLEŞMEDİ</div></div>
      <div class="stat-card"><div class="val">${total}</div><div class="lbl">TOPLAM</div></div>
    `;
}

function downloadJSON() {
    if(Object.keys(eslesmeData.eslesmeler).length === 0) { alert("İndirilecek veri yok."); return; }
    const fname = document.getElementById('dl-filename').value || 'eslesme';
    const blob = new Blob([JSON.stringify(eslesmeData, null, 2)], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = fname + '.json'; a.click();
}

function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
}
</script>
